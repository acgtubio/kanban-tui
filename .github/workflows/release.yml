name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            ext: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            label: darwin-aarch64
            ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Linux/macOS)
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/editui dist/editui

      - name: Package (Linux/macOS)
        run: |
          cd dist
          tar -czf ../editui-${{ matrix.label }}.tar.gz *

      - name: Generate checksum (Linux/macOS)
        run: |
          sha256sum editui-${{ matrix.label }}.tar.gz > editui-${{ matrix.label }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            editui-*
